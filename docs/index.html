    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #070714;
            color: #fff;
            overflow-x: hidden;

            flex-direction: column;
        }

        #particles-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            will-change: transform;
            animation: orbFloat 14s ease-in-out infinite;
        }
        .orb-1 {
            width: 700px; height: 700px;
            background: radial-gradient(circle at center, rgba(30, 64, 175, 0.25), transparent 65%);
            top: -250px; left: -250px;
        }
        .orb-2 {
            width: 600px; height: 600px;
            background: radial-gradient(circle at center, rgba(15, 52, 96, 0.3), transparent 65%);
            bottom: -200px; right: -200px;
            animation-delay: -5s;
        }
        .orb-3 {
            width: 450px; height: 450px;
            background: radial-gradient(circle at center, rgba(59, 130, 246, 0.15), transparent 65%);
            top: 40%; right: 10%;
            animation-delay: -9s;
        }
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(25px, -30px); }
            66% { transform: translate(-20px, 20px); }
        }

        .main-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            position: relative;
            z-index: 2;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 28px;
            padding: 4rem 4.5rem;
            max-width: 720px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6),
                        inset 0 1px 0 rgba(255, 255, 255, 0.08);
            animation: cardIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(40px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .brand { margin-bottom: 2.5rem; animation: fadeUp 0.7s ease-out 0.2s both; }
        .brand-name {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.25em;
            text-transform: none;
            background: linear-gradient(90deg, #3b82f6 0%, #1e40af 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .brand-line {
            width: 48px; height: 2px;
            background: linear-gradient(90deg, #3b82f6, #1e40af);
            margin: 0.8rem auto 0;
            border-radius: 2px;
        }

        .cs-heading {
            margin-bottom: 1.25rem;
            line-height: 0.9;
            perspective: 600px;
        }
        .cs-row { display: flex; justify-content: center; gap: 0.04em; }
        .cs-row + .cs-row { margin-top: 0.04em; }
        .cs-heading span {
            display: inline-block;
            font-size: clamp(4rem, 12vw, 7.5rem);
            font-weight: 700;
            letter-spacing: 0.04em;
            background: linear-gradient(160deg, #ffffff 30%, rgba(255, 255, 255, 0.45) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: letterIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) calc(var(--i) * 60ms) both;
        }
        @keyframes letterIn {
            from { opacity: 0; transform: translateY(50px) rotateX(-25deg); }
            to   { opacity: 1; transform: translateY(0) rotateX(0); }
        }

        .tagline {
            font-size: 1rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.45);
            letter-spacing: 0.06em;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            animation: fadeUp 0.7s ease-out 0.85s both;
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 2.8rem;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #1e40af 100%);
            background-size: 200% 100%;
            background-position: 0% 0%;
            transition: background-position 0.4s ease, transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeUp 0.7s ease-out 1.2s both;
        }
        .cta-btn:hover {
            background-position: 100% 0%;
            transform: translateY(-3px);
            box-shadow: 0 16px 40px rgba(30, 64, 175, 0.45);

        .cta-btn .arrow {

            transition: transform 0.3s ease;

        .cta-btn:hover .arrow { transform: translateX(4px); }

        .secondary-links {

        }
        .secondary-links a {
            color: rgba(255, 255, 255, 0.35);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            transition: color 0.2s ease;
            margin: 0 0.75rem;
        }
        .secondary-links a:hover { color: rgba(255, 255, 255, 0.7); }

            to   { opacity: 1; transform: translateY(0); }

<body>
    <canvas id="particles-canvas"></canvas>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <main class="main-wrapper">
        <div class="glass-card">

                <div class="cs-row">
                    <span style="--i:7">S</span><span style="--i:8">O</span><span style="--i:9">O</span><span style="--i:10">N</span>
                </div>
            </div>

            <p class="tagline">An operating system for AI-Native Companies.</p>

            <a href="blueprint/" class="cta-btn">Read our AI-Native Company Blueprint <span class="arrow">&rarr;</span></a>
        </div>

    </footer>

    <script>
        (function () {
            var canvas = document.getElementById('particles-canvas');
            var ctx = canvas.getContext('2d');
            var particles = [];
            var raf;
            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            function Particle() { this.init(); }
            Particle.prototype.init = function () {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.r = Math.random() * 1.5 + 0.5;
                this.alpha = Math.random() * 0.4 + 0.1;
                this.hue = Math.random() < 0.15 ? '30,64,175' : '160,190,255';
            };
            Particle.prototype.update = function () {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            };
            Particle.prototype.draw = function () {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(' + this.hue + ',' + this.alpha + ')';
                ctx.fill();
            };
            function initParticles() {
                resize();
                var count = Math.max(60, Math.min(130, Math.floor(canvas.width * canvas.height / 8000)));
                particles = [];
                for (var i = 0; i < count; i++) particles.push(new Particle());
            }
            function connectParticles() {
                var maxD = 110;
                for (var i = 0; i < particles.length; i++) {
                    for (var j = i + 1; j < particles.length; j++) {
                        var dx = particles[i].x - particles[j].x;
                        var dy = particles[i].y - particles[j].y;
                        var d = Math.sqrt(dx * dx + dy * dy);
                        if (d < maxD) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = 'rgba(160,190,255,' + ((1 - d / maxD) * 0.12) + ')';
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
            }
            function loop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (var i = 0; i < particles.length; i++) { particles[i].update(); particles[i].draw(); }
                connectParticles();
                raf = requestAnimationFrame(loop);
            }
            window.addEventListener('resize', function () { cancelAnimationFrame(raf); initParticles(); loop(); });
            initParticles();
            loop();
        })();
    </script>
